<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <h2>Udemy Auto Translate</h2>
    <fieldset class="mode-section">
      <legend>翻訳モード</legend>
      <label class="mode-option">
        <input type="radio" name="translateMode" value="original" />
        <span>原文（英語）</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="translateMode" value="standard" checked />
        <span>翻訳</span>
      </label>
    </fieldset>
    <div class="language-section">
      <label for="targetLang">翻訳先言語</label>
      <select id="targetLang">
        <option value="ja" selected>日本語</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ko">한국어</option>
      </select>
    </div>
    <div class="status-section">
      <span id="statusText">翻訳</span>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
